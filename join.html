<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감자농장_회원가입</title>
    <link rel="stylesheet" href="join.css">
    <link rel="shortcut icon" type="image/x-icon" href="potato_icon.png">
</head>
<body>
    <h1><large><b>회원 가입을 도와드리겠감자</b></large></h1>
    <br><br>
    <form>
        <label for="myId">아이디: </label>
        <input type="text" id="myId" maxlength="10em" style="border-radius:15px; background-color:aliceblue; color: black;"><br><br>
        <label for="myPw">비밀번호: </label>
        <input type="password" id="myPw" maxlength="10em" style="border-radius: 15px; background-color:aliceblue; color:black;"><br><br>
        <label for="myPwright">비밀번호 확인: </label>
        <input type="password" id="myPwright" maxlength="10em" style="border-radius: 15px; background-color:aliceblue; color:black;"><br><br>
        <label for="old-select">연령대:</label>
            <select name="older" id="old-select" style="border-radius:15px; background-color:aliceblue; color: black;">
                <option value="" select style="background-color:bisque;">연령대를 선택해 주시감자</option>
                <option value="20-29" style="background-color:bisque;">20대</option>
                <option value="30-39" style="background-color:bisque;">30대</option>
                <option value="40-49" style="background-color:bisque;">40대</option>
                <option value="50-59" style="background-color:bisque;">50대</option>
            </select><br><br>
        
        <label for="place">거주지:</label>
            <select name="myPlace" id="place" style="border-radius:15px; background-color:aliceblue; color: black;">
                <option style="background-color:bisque;" value="" select>거주지를 선택해 주시감자</option>
                <option value="강동" style="background-color:bisque;">강동구</option>
                <option value="송파" style="background-color:bisque;">송파구</option>
                <option value="강남" style="background-color:bisque;">강남구</option>
                <option value="서초" style="background-color:bisque;">서초구</option>
                <option value="관악" style="background-color:bisque;">관악구</option>
                <option value="동작" style="background-color:bisque;">동작구</option>
                <option value="영등포" style="background-color:bisque;">영등포구</option>
                <option value="금천" style="background-color:bisque;">금천구</option>
                <option value="구로" style="background-color:bisque;">구로구</option>
                <option value="양천" style="background-color:bisque;">양천구</option>
                <option value="강서" style="background-color:bisque;">강서구</option>
                <option value="마포" style="background-color:bisque;">마포구</option>
                <option value="서대문" style="background-color:bisque;">서대문구</option>
                <option value="은평" style="background-color:bisque;">은평구</option>
                <option value="종로" style="background-color:bisque;">종로구</option>
                <option value="중" style="background-color:bisque;">중구</option>
                <option value="용산" style="background-color:bisque;">용산구</option>
                <option value="성동" style="background-color:bisque;">성동구</option>
                <option value="동대문" style="background-color:bisque;">동대문구</option>
                <option value="광진" style="background-color:bisque;">광진구</option>
                <option value="중랑" style="background-color:bisque;">중랑구</option>
                <option value="성북" style="background-color:bisque;">성북구</option>
                <option value="강북" style="background-color:bisque;">강북구</option>
                <option value="도봉" style="background-color:bisque;">도봉구</option>
                <option value="노원" style="background-color:bisque;">노원구</option>
            </select><br><br>

        <button type="submit" formtarget="_self" formaction="login.html" style="border-radius: 15px; background-color:rgb(254, 179, 150); color: black;">가입 완료</button>
    </form>

</body>
</html>
